<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#5DB3BF"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="#041823" rx="12"/>

  <!-- Edges (drawn first, behind nodes) -->
  <!-- Person → Movie -->
  <line x1="181" y1="119" x2="119" y2="202" stroke="#5DB3BF" stroke-width="1.8" marker-end="url(#arrow)"/>
  <!-- Person → Place -->
  <line x1="219" y1="119" x2="281" y2="202" stroke="#5DB3BF" stroke-width="1.8" marker-end="url(#arrow)"/>
  <!-- Person → Tag -->
  <line x1="232" y1="96"  x2="303" y2="91"  stroke="#5DB3BF" stroke-width="1.8" marker-end="url(#arrow)"/>
  <!-- Place → Tag -->
  <line x1="307" y1="197" x2="316" y2="109" stroke="#5DB3BF" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- Edge labels -->
  <text x="136" y="158" text-anchor="middle" fill="#8FE3E8" font-family="sans-serif" font-size="9" font-style="italic">ACTED_IN</text>
  <text x="263" y="158" text-anchor="middle" fill="#8FE3E8" font-family="sans-serif" font-size="9" font-style="italic">VISITED</text>
  <text x="268" y="86"  text-anchor="middle" fill="#8FE3E8" font-family="sans-serif" font-size="9" font-style="italic">TAGGED</text>

  <!-- Nodes (drawn after edges, on top) -->
  <circle cx="200" cy="100" r="32" fill="#0A6190" stroke="#8FE3E8" stroke-width="1.5"/>
  <circle cx="100" cy="220" r="26" fill="#145439" stroke="#8FE3E8" stroke-width="1.5"/>
  <circle cx="300" cy="220" r="26" fill="#014063" stroke="#5DB3BF" stroke-width="1.5"/>
  <circle cx="320" cy="90"  r="20" fill="#FFA901" stroke="#FFD066" stroke-width="1.5"/>

  <!-- Node labels (on top of everything) -->
  <text x="200" y="96"  text-anchor="middle" dominant-baseline="middle" fill="white" font-family="sans-serif" font-size="11" font-weight="bold">Person</text>
  <text x="200" y="110" text-anchor="middle" dominant-baseline="middle" fill="#8FE3E8" font-family="sans-serif" font-size="8">Alice</text>
  <text x="100" y="220" text-anchor="middle" dominant-baseline="middle" fill="white" font-family="sans-serif" font-size="10" font-weight="bold">Movie</text>
  <text x="300" y="220" text-anchor="middle" dominant-baseline="middle" fill="white" font-family="sans-serif" font-size="10" font-weight="bold">Place</text>
  <text x="320" y="90"  text-anchor="middle" dominant-baseline="middle" fill="#041823" font-family="sans-serif" font-size="9" font-weight="bold">Tag</text>

  <!-- Caption -->
  <text x="200" y="278" text-anchor="middle" fill="#5DB3BF" font-family="sans-serif" font-size="11" opacity="0.8">Neo4j Property Graph</text>
</svg>
